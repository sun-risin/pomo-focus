name: CI for Test and Docker verify

on:
  pull_request:
  push:
    branches:
      - main
      
jobs:
  # 1) 코드 검증
  test:
    name: Run pytest
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
        env:
          ENV: test

  # 2) 도커 이미지 빌드 검증
  docker-verify:
    name: Docker Build (CI)
    runs-on: ubuntu-latest
    needs: test             # 앞선 테스트 통과 후에만 실행됨

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pomofocus:ci .

      - name: Run container
        run: |
          docker run -d --name pomofocus_ci \
          -e PORT=10000 \
          -p 10000:10000 \
          pomofocus:ci

      - name: Wait for container
        run: sleep 3
        
      - name: Check container
        uses: jtalk/url-health-check-action@v5
        with:
          url: http://localhost:10000/
          max-attempts: 3
          retry-delay: 2s

      - name: Cleanup
        if: always()
        run: docker rm -f pomofocus_ci || true