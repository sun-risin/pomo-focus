<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PomoFocus</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 좌측: Todo 리스트 -->
        <aside class="sidebar">
            <h2>Todo List</h2>
            <div class="todo-input-group">
                <input type="text" id="todoInput" placeholder="새로운 Todo 입력...">
                <button id="addTodoBtn">추가</button>
            </div>
            <ul id="todoList">
                <!-- Todo가 여기에 추가될 예정 -->
            </ul>
        </aside>

        <!-- 우측: 타이머 및 대시보드 -->
        <main class="timer-section">
            <h2 id="activeTaskTitle">Todo를 먼저 선택해주세요.</h2>

            <!-- 뽀모도로 기법을 위한 원형 타이머 자리 -->
            <div class="timer-circle" id="timerCircle">
                <div class="timer-display">
                    <span id="timerMinutes">30</span>:<span id="timerSeconds">00</span>
                </div>
            </div>
            <div class="timer-controls">
                <button id="startBtn">시작</button>
                <button id="pauseBtn">일시정지</button>
                <button id="resetBtn">재설정</button>
            </div>

            <h4>타이머가 만료되거나 정지되어야 Todo에 경과 시간이 기록됩니다.</h4>

            <div class="timer-setting" id="settingArea">
                <input type="number" id="setMin" value="30" min="0" max="60"> 분
                <input type="number" id="setSec" value="0" min="0" max="59"> 초
            </div>
        </main>
    </div>
    <script type="module" src="/static/script.js"></script>
</body>
</html>
